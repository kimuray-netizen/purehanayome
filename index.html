                                    <table className="w-full min-w-[550px] border-collapse bg-white rounded-[2rem] overflow-hidden shadow-sm text-sm lg:text-base">
                                        <thead>
                                            <tr className="bg-stone-200/50 text-stone-500 font-bold uppercase tracking-widest text-xs lg:text-sm">
                                                <th className="p-6 text-left border-b border-stone-100">項目</th>
                                                <th className="p-6 text-center border-b border-stone-100">脂肪吸引</th>
                                                <th className="p-6 text-center border-b border-stone-100">脂肪冷却</th>
                                                <th className="p-6 text-center bg-rose-50 text-rose-500 border-b border-stone-100 font-bold text-rose-600">スルリム</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {comparisonCategories.map((cat, idx) => (
                                                <tr key={idx} className="border-t border-stone-50 hover:bg-stone-50 transition-colors">
                                                    <td className="p-6 font-bold text-stone-700 bg-stone-50/50">{cat.name}</td>
                                                    <td className="p-6 text-center text-stone-500 leading-relaxed">{cat.lipo}</td>
                                                    <td className="p-6 text-center text-stone-500 leading-relaxed">{cat.cool}</td>
                                                    <td className="p-6 text-center font-bold text-rose-600 bg-rose-50/20 leading-relaxed">{cat.slim}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* CTA 2 */}
                            <LineCTA text="LINEで無料診断を受ける" />

                            {/* Compact Voice Section */}
                            <div>
                                <div className="text-center mb-12">
                                    <p className="text-rose-400 font-bold text-xs lg:text-sm tracking-widest uppercase mb-1">Voice — 花嫁さんたちの声</p>
                                    <h4 className="text-2xl lg:text-4xl font-serif text-stone-900 tracking-tight">同じ悩みを持つ花嫁さんたちの一歩</h4>
                                </div>
                                <div className="grid gap-6">
                                    {voiceData.map((v, i) => (
                                        <div key={i} className="bg-white p-6 lg:p-10 rounded-[2rem] border border-stone-100 shadow-sm text-left hover:shadow-md transition-shadow relative overflow-hidden text-stone-800">
                                            <div className="flex gap-1 mb-4 text-stone-800">
                                                {[...Array(5)].map((_, idx) => (
                                                    <Icon key={idx} name="Star" size={16} className={idx < v.rating ? "text-rose-300 fill-rose-300" : "text-stone-200 fill-stone-200"} />
                                                ))}
                                            </div>
                                            <p className="text-stone-600 text-base lg:text-xl mb-6 italic leading-relaxed text-stone-600">「{v.quote}」</p>
                                            <div className="flex items-center gap-4 border-t border-stone-50 pt-6">
                                                <span className="text-3xl lg:text-4xl leading-none">{v.icon}</span>
                                                <div>
                                                    <p className="font-bold text-stone-800 text-base lg:text-xl leading-tight">{v.name}</p>
                                                    <p className="text-stone-400 text-xs lg:text-sm font-medium mt-1 text-stone-400">{v.profile}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Clinic List Section */}
                    <section className="py-24 bg-white px-4 border-t border-stone-100 text-stone-800">
                        <div className="max-w-4xl mx-auto">
                            <div className="text-center mb-16 text-stone-800">
                                <span className="inline-flex items-center gap-2 text-rose-400 font-bold text-xs lg:text-sm tracking-widest uppercase mb-4">
                                    <Icon name="MapPin" size={16} /> Nationwide Network
                                </span>
                                <h4 className="text-2xl lg:text-4xl font-serif text-stone-900 leading-tight">
                                    全国<span className="text-stone-400 italic mx-1">34</span>院展開中<br />
                                    お近くのクリニックをチェック
                                </h4>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12">
                                {clinics.map((region, idx) => (
                                    <div key={idx} className="space-y-6 p-6 rounded-3xl bg-stone-50/50 border border-stone-100 hover:border-rose-100 transition-colors">
                                        <h5 className="text-lg font-bold text-stone-800 border-b-2 border-rose-100 pb-2 flex items-center justify-between">
                                            {region.region}
                                        </h5>
                                        <div className="space-y-5">
                                            {region.subgroups.map((group, gIdx) => (
                                                <div key={gIdx} className="space-y-1">
                                                    <p className="text-[10px] lg:text-xs font-bold text-stone-400 uppercase tracking-wider">{group.label}</p>
                                                    <p className="text-sm lg:text-base text-stone-600 leading-relaxed">
                                                        {group.list}
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Final CTA Area */}
                    <div className="bg-[#fdf8f4] py-24 px-4 text-center">
                        <p className="text-rose-400 font-bold mb-4 text-xs lg:text-lg tracking-widest uppercase">Solution</p>
                        <h4 className="text-3xl lg:text-6xl font-serif mb-10 leading-relaxed text-stone-900">そのお悩み、<br className="sm:hidden" />スルリムにお任せください</h4>
                        <p className="text-stone-600 max-w-2xl mx-auto text-base lg:text-2xl leading-relaxed mb-12">
                            最先端の医療で最短翌日〜１週間。切らない・腫れ０・リバウンド０を追求し、自信を持ってバージンロードを歩くお手伝いをします。
                        </p>
                        <button className="bg-[#06C755] hover:bg-[#05b34d] text-white px-12 py-6 rounded-full text-xl lg:text-3xl font-bold transition-all shadow-xl active:scale-95 flex items-center justify-center gap-3 mx-auto pulse-green">
                            <Icon name="MessageCircle" className="fill-white" size={32} />
                            LINEで無料相談
                        </button>
                    </div>

                    {/* Footer */}
                    <footer className="py-24 bg-stone-900 text-white text-center px-4">
                        <p className="font-serif tracking-[0.5em] text-white/90 uppercase mb-10 text-xl lg:text-3xl">Slim Injection Clinic</p>
                        <div className="flex justify-center gap-10 text-white/40 text-[10px] lg:text-sm mb-12">
                            <span className="hover:text-white transition-colors cursor-pointer border-b border-transparent hover:border-white">プライバシーポリシー</span>
                            <span className="hover:text-white transition-colors cursor-pointer border-b border-transparent hover:border-white">利用規約</span>
                            <span className="hover:text-white transition-colors cursor-pointer border-b border-transparent hover:border-white">運営会社</span>
                        </div>
                        <p className="text-white/20 text-[10px] lg:text-xs">© 2024 Slim Injection Beauty Medical. All rights reserved.</p>
                    </footer>

                    {/* Floating Mobile CTA */}
                    <div className="lg:hidden fixed bottom-6 left-6 right-6 z-[60] flex flex-col gap-2">
                        <button className="w-full bg-[#06C755] text-white py-5 rounded-full font-bold shadow-2xl flex items-center justify-center gap-3 text-lg active:scale-95 transition-transform border border-white/20">
                            <Icon name="MessageCircle" className="fill-white" size={24} />
                            LINEで無料相談
                            <Icon name="ChevronRight" size={20} />
                        </button>
                    </div>
                </div>
            );
        };

        // Render function
        const mountApp = () => {
            const container = document.getElementById('root');
            if (container) {
                const root = ReactDOM.createRoot(container);
                root.render(<App />);
            }
        };

        mountApp();
    </script>
</body>
</html>
